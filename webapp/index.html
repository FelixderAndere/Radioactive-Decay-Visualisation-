<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioaktiver Zerfall Simulator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="modal.css" />
</head>
<body>

    <header>
        <h1>Radioaktiver Zerfall</h1>
        <p>Visuelle Simulation von radioaktiven Zerfallsketten</p>
    </header>

    <div class="container">
        <div class="panel">
            <div style="display: flex; justify-content: space-between;">
                <div class="control-group">
                    <label for="max-time-input">Maximale Zeit</label>
                    <div class="time-display"><span id="years-max">0.00</span> Jahre</div>
                    
                </div>
                <div class="control-group">
                    <label>Simulierte Zeit</label>
                    <div class="time-display"><span id="years-val">0.00</span> Jahre</div>
                </div>
            </div>

            <input type="range" 
                id="max-time-input" 
                name="maxTime" 
                min="0" 
                max="200" 
                step="0.25" 
                style="width: 100%; margin-bottom: 20px; margin-top: 0px;"
                value="100"
                oninput="document.getElementById('years-max').innerText = parseFloat(this.value).toFixed(2)"
            >

            <div class="btn-row">
                <button id="btn-play" class="primary">Start</button>
                <button id="btn-reset">Reset</button>
            </div>

            <div class="control-group">
                <label for="speed-slider">Simulationsgeschwindigkeit</label>
                <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1" style="width:100%">
            </div>

            <hr style="border-color: #334155; margin: 25px 0;">

            <div class="substances">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <h3>Substanzen & Anteile</h3>
                    <button id="btn-edit" style="height: 34.5px;">Bearbeiten</button>
                </div>
                <div id="stats-container"></div>
            </div>            
        </div>

        <div class="visualization-area">
            <div class="canvas-container">
                <div class="canvas-label">Atomgitter (Zustandswechsel)</div>
                <canvas id="particle-canvas" height="300"></canvas>
            </div>
            
            <div class="canvas-container">
                <div class="canvas-toolbar">
                    <div class="canvas-label">Verlaufskurve</div>
                    <div class="segmented-control" aria-label="Graph-Daten">
                        <button id="graph-theoretical" class="active" type="button">Theorie</button>
                        <button id="graph-random" type="button">Zufall</button>
                    </div>
                </div>
                <canvas id="chart-canvas" height="220"></canvas>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px);">
        <div class="modal-content" style="background-color: #1e293b; color: #fff; margin: 5% auto; padding: 20px; border: 1px solid #334155; width: 80%; max-width: 600px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Simulations-Einstellungen</h2>
                <span id="modal-close-x" style="font-size: 28px; font-weight: bold; cursor: pointer; color: #94a3b8;">&times;</span>
            </div>

            <div class="modal-body">
                <div id="modal-substances-container"></div>
                
                <hr style="border-color: #334155; margin: 20px 0;">
                
                <h3>Neue Substanz hinzufügen</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: flex-end;">
                    <div style="flex: 1;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:4px;">Name</label>
                        <input type="text" id="new-substance-name" placeholder="z.B. F" style="width:100%; padding: 6px; background:#0f172a; color:#fff; border:1px solid #475569; border-radius:4px;">
                    </div>
                    <div style="flex: 2;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:4px;">Halbwertszeit (j)</label>
                        <input type="text" id="new-substance-hl" placeholder="Zahl oder Infinity" style="width:100%; padding: 6px; background:#0f172a; color:#fff; border:1px solid #475569; border-radius:4px;">
                    </div>
                    <div style="flex: 2;">
                        <label style="display:block; font-size:0.8rem; margin-bottom:4px;">Startwert (0.0 - 1.0)</label>
                        <input type="number" id="new-substance-val" step="0.1" min="0" max="1" placeholder="0.0" style="width:100%; padding: 6px; background:#0f172a; color:#fff; border:1px solid #475569; border-radius:4px;">
                    </div>
                    <button id="btn-add-substance" style="padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; height: 33px; font-weight: bold;">+</button>
                </div>
            </div>

            <hr style="border-color: #334155; margin: 20px 0;">

            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="modal-cancel-btn" style="padding: 8px 16px; background: #475569; color: white; border: none; border-radius: 4px; cursor: pointer;">Abbrechen</button>
                <button id="modal-save-btn" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">Speichern & Übernehmen</button>
            </div>
        </div>
    </div>

    <script src="decay.js" defer></script>
    <script src="script.js" defer></script>
    <script src="editModal.js" defer></script>
</body>
</html>
