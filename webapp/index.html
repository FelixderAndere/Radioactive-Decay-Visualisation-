<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioaktiver Zerfall - Anteilssimulation</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>☢ Radioaktiver Zerfall (Anteile)</h1>
    <p>Simulation von relativen Anteilen in Zerfallsketten</p>
</header>

<main>

    <!-- ========================= -->
    <!-- Simulation Steuerung -->
    <!-- ========================= -->

    <section class="card">

        <h2>Simulation</h2>

        <div class="controls">

            <button id="playButton">Start</button>
            <button id="pauseButton">Pause</button>
            <button id="resetButton">Reset</button>

        </div>

        <div class="sliderContainer">

            <label>
                Zeit:
                <span id="timeValue">0.0</span>
                Jahre
            </label>

            <input
                type="range"
                id="timeSlider"
                min="0"
                max="100"
                step="0.1"
                value="0">

        </div>

        <div class="speedContainer">

            <label>
                Geschwindigkeit:
                <span id="speedValue">1.0</span>x
            </label>

            <input
                type="range"
                id="speedSlider"
                min="0.1"
                max="10"
                step="0.1"
                value="1">

        </div>

    </section>

    <!-- ========================= -->
    <!-- Diagramm -->
    <!-- ========================= -->

    <section class="card">

        <h2>Anteile über Zeit</h2>

        <canvas id="decayChart"></canvas>

    </section>

    <!-- ========================= -->
    <!-- Stoff Editor -->
    <!-- ========================= -->

    <section class="card">

        <div class="titleRow">
            <h2>Zerfallssystem</h2>
            <button id="addSubstanceButton">+ Stoff</button>
        </div>

        <table id="substanceTable">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Anteil (Start)</th>
                    <th>Halbwertszeit</th>
                    <th>Zerfallsprodukte (JSON)</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="substanceTableBody"></tbody>

        </table>

    </section>

    <!-- ========================= -->
    <!-- Ergebnis Anzeige -->
    <!-- ========================= -->

    <section class="card">

        <h2>Aktuelle Anteile</h2>

        <table>

            <thead>
                <tr>
                    <th>Stoff</th>
                    <th>%</th>
                </tr>
            </thead>

            <tbody id="resultTableBody"></tbody>

        </table>

    </section>

</main>

<!-- ========================= -->
<!-- Template -->
<!-- ========================= -->

<template id="substanceRowTemplate">

<tr>

    <td>
        <input class="nameInput" type="text" placeholder="A">
    </td>

    <td>
        <input class="valueInput" type="number" step="0.01" min="0" max="1">
    </td>

    <td>
        <input class="halfLifeInput" type="text" placeholder="∞ oder Zahl">
    </td>

    <td>
        <textarea class="productsInput" rows="2"
            placeholder='{"B":0.7,"C":0.3}'></textarea>
    </td>

    <td>
        <button class="deleteButton">🗑</button>
    </td>

</tr>

</template>

</body>
</html>
