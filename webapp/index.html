<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioaktiver Zerfall Simulator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="modal.css" />
</head>
<body>

    <header>
        <h1>Radioaktive Zerfallskette</h1>
        <p>Visuelle Simulation mittels Matrixexponential</p>
    </header>

    <div class="container">
        <div class="panel">
            <div style="display: flex; justify-content: space-between;">
                <div class="control-group">
                    <label for="max-time-input">Maximale Zeit</label>
                    <div class="time-display"><span id="years-max">0.00</span> Jahre</div>
                    <input 
                        type="range" 
                        id="max-time-input" 
                        name="maxTime" 
                        min="0" 
                        max="200" 
                        step="0.25" 
                        value="0"
                        oninput="document.getElementById('years-max').innerText = parseFloat(this.value).toFixed(2)"
                    >
                </div>
                <div class="control-group">
                    <label>Simulierte Zeit</label>
                    <div class="time-display"><span id="years-val">0.00</span> Jahre</div>
                </div>
            </div>

            <div class="btn-row">
                <button id="btn-play" class="primary">Start</button>
                <button id="btn-reset">Reset</button>
            </div>

            <div class="control-group">
                <label for="speed-slider">Simulationsgeschwindigkeit</label>
                <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1" style="width:100%">
            </div>

            <hr style="border-color: #334155; margin: 25px 0;">

            <div class="substances">
                <div style="display: flex; align-items: center;">
                    <h3>Substanzen & Anteile</h3>
                    <button id="btn-edit" style="height: 34.5px; margin-left: 5px;">Bearbeiten</button>
                </div>
                <div id="stats-container"></div>
            </div>            
            
        </div>

        <div class="visualization-area">
            <div class="canvas-container">
                <div class="canvas-label">Atomgitter (Zustandswechsel)</div>
                <canvas id="particle-canvas" height="300"></canvas>
            </div>
            
            <div class="canvas-container">
                <div class="canvas-label">Verlaufskurve</div>
                <canvas id="chart-canvas" height="220"></canvas>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Einstellungen anpassen</h2>
                <button class="close-btn" id="modal-close-x">&times;</button>
            </div>
            <div class="modal-body">
                <div class="control-group" style="margin-bottom: 15px;">
                    <label for="modal-input-example" style="display:block; margin-bottom:5px;">Beispiel-Einstellung:</label>
                    <input type="text" id="modal-input-example" placeholder="Wert eingeben..." style="width:100%; padding: 8px; box-sizing:border-box; border-radius:4px; border: 1px solid #475569; background:#0f172a; color:#fff;">
                </div>
                <p style="font-size: 0.9rem; color: #94a3b8;">Work in progress.</p>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" style="padding: 8px 16px; background: #475569; color: white; border: none; border-radius: 4px; cursor: pointer;">Abbrechen</button>
                <button id="modal-save-btn" style="padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer;">Speichern</button>
            </div>
        </div>
    </div>

    <script src="decay.js"></script>
    <script src="script.js"></script>
    <script src="editModal.js"></script>
</body>
</html>
