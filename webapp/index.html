<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radioaktiver Zerfall Simulator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="modal.css" />
</head>
<body>

    <header>
        <h1>Radioaktiver Zerfall</h1>
        <p>Visuelle Simulation von radioaktiven Zerfallsketten</p>
    </header>

    <div class="container">
        <div class="panel">
            <div style="display: flex; justify-content: space-between;">
                <div class="control-group">
                    <label for="max-time-input">Maximale Zeit</label>
                    <div class="time-display"><span id="years-max">100.00</span> Jahre</div>
                    
                </div>
                <div class="control-group">
                    <label style="text-align: end;">Simulierte Zeit</label>
                    <div class="time-display"><span id="years-val">0.00</span> Jahre</div>
                </div>
            </div>

            <input type="range" 
                id="max-time-input" 
                name="maxTime" 
                min="0" 
                max="200" 
                step="0.25" 
                style="width: 100%; margin-bottom: 20px; margin-top: 0px;"
                value="100"
                oninput="document.getElementById('years-max').innerText = parseFloat(this.value).toFixed(2)"
            >

            <div class="btn-row">
                <button id="btn-play" class="primary">Start</button>
                <button id="btn-reset">Reset</button>
            </div>

            <div class="control-group">
                <div style="display: flex;justify-content: space-between; align-items: center;">
                    <label for="speed-slider">Simulationsschritte</label>
                    <div><span id="years-step">0.00</span> Jahre</div>
                </div>
                <input type="range" id="speed-slider" min="0.01" max="5" step="0.1" value="1" style="width:100%">
            </div>

            <hr style="border-color: #334155; margin: 25px 0;">

            <div class="substances">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <h3>Substanzen & Anteile</h3>
                    <button id="btn-edit" style="height: 34.5px;">Bearbeiten</button>
                </div>
                <div id="stats-container"></div>
            </div>            
        </div>

        <div class="visualization-area">
            <div class="canvas-container">
                <div class="canvas-label">Atomgitter (Zustandswechsel)</div>
                <canvas id="particle-canvas" height="300"></canvas>
            </div>
            
            <div class="canvas-container">
                <div class="canvas-toolbar">
                    <div class="canvas-label">Verlaufskurve</div>
                    <div class="segmented-control" aria-label="Graph-Daten">
                        <button id="graph-theoretical" class="active" type="button">Theorie</button>
                        <button id="graph-random" type="button">Zufall</button>
                    </div>
                </div>
                <canvas id="chart-canvas" height="220"></canvas>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">

        <div class="modal-content">

            <div class="modal-header">
                <h2>Simulation bearbeiten</h2>

                <button
                    id="modal-close-x"
                    class="close-btn">
                    &times;
                </button>
            </div>

            <div class="modal-body">

                <div id="modal-substances-container"></div>

                <hr>

                <div>

                    <h3>Neue Substanz</h3>

                    <div class="add-substance-grid">

                        <div>
                            <label>Name</label>
                            <input
                                id="new-substance-name"
                                type="text"
                                placeholder="A">
                        </div>

                        <div>
                            <label>Halbwertszeit</label>
                            <input
                                id="new-substance-hl"
                                type="text"
                                placeholder="10 oder Infinity">
                        </div>

                        <div>
                            <label>Startwert</label>
                            <input
                                id="new-substance-val"
                                type="number"
                                min="0"
                                max="1"
                                step="0.01"
                                placeholder="0.0">
                        </div>

                        <button
                            id="btn-add-substance"
                            class="primary">
                            +
                        </button>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button id="modal-cancel-btn">
                    Abbrechen
                </button>

                <button
                    id="modal-save-btn"
                    class="primary">
                    Speichern
                </button>

            </div>

        </div>

    </div>

    <script src="decay.js" defer></script>
    <script src="script.js" defer></script>
    <script src="editModal.js" defer></script>
</body>
</html>
